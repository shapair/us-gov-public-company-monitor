services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: govmonitor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/govmonitor
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000"
      SCHEDULER_ENABLED: "true"
      SEC_USER_AGENT: "USGovMonitor/1.0 (contact@example.com)"
      # Route outbound HTTPS through a host-side CONNECT proxy. Some Docker
      # Desktop / macOS environments cannot complete TLS handshakes from
      # containers to public APIs. Start the proxy with:
      #   python scripts/host_connect_proxy.py
      # To bypass the proxy, set HOST_CONNECT_PROXY_URL to an empty string.
      HTTPS_PROXY: ${HOST_CONNECT_PROXY_URL:-http://host.docker.internal:8788}
      NO_PROXY: "db,localhost,127.0.0.1,raw.githubusercontent.com,github.com,githubusercontent.com"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: "http://localhost:8000/api/v1"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
